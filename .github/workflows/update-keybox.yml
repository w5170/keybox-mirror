name: Update TAKR keybox

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch latest TAKR keybox
        env:
          CAPMONSTER_CLIENT_KEY: ${{ secrets.CAPMONSTER_CLIENT_KEY }}
        run: python scripts/update_keybox.py

      - name: Commit keybox if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add keybox.xml metadata.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Update TAKR keybox"
          git push
